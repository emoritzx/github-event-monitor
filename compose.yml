name: github-event-monitor

services:

  # Object Storage
  elasticsearch:
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
    image: elasticsearch:9.4.3
    volumes:
      - elasticsearch:/usr/share/elasticsearch/data:rw

  # Event Poller
  poller:
    build: ./poller
    depends_on:
      rabbitmq:
        condition: service_healthy
    env_file:
      - ./secrets/github-api.env
      - ./secrets/rabbitmq-credentials.env
      - ./secrets/rails.env
    healthcheck:
      test: curl --fail localhost:3000/up
      interval: 60s
      timeout: 30s
      retries: 3
      start_period: 15s
    profiles:
      - ingest

  # System of record
  postgres:
    environment:
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres-password
    image: postgres:18.4-alpine3.24
    restart: always
    secrets:
      - postgres-password
    volumes:
      - postgres:/var/lib/postgresql:rw

  # GitHub API Proxy
  proxy:
    env_file:
      - ./secrets/github-api.env
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://0.0.0.0/proxy/health
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    image: nginx:1.31.2-alpine3.23-slim
    volumes:
      - ./proxy/templates:/etc/nginx/templates:ro

  # Message Broker
  rabbitmq:
    env_file:
      # rabbitmq image doesn't use RABBITMQ_DEFAULT_PASS_FILE since 3.9
      - ./secrets/rabbitmq-credentials.env
    healthcheck:
      test: rabbitmq-diagnostics --quiet check_running && rabbitmq-diagnostics --quiet check_local_alarms
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 15s
    image: rabbitmq:4.3.2-management-alpine
    volumes:
      - rabbitmq:/var/lib/rabbitmq:rw

  # Request Manager
  request-manager:
    build: ./request-manager
    depends_on:
      proxy:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    env_file:
      - ./secrets/github-api.env
      - ./secrets/rabbitmq-credentials.env
      - ./secrets/rails.env
    environment:
      # override the GitHub API values to point to local proxy
      GITHUB_API_DOMAIN: proxy
      GITHUB_API_PORT: "80"
      GITHUB_API_SCHEME: http
    healthcheck:
      test: curl --fail localhost:3000/up
      interval: 60s
      timeout: 30s
      retries: 3
      start_period: 15s

secrets:
  postgres-password:
    file: ./secrets/postgres-password.txt

volumes:
  elasticsearch:
  postgres:
  rabbitmq:
